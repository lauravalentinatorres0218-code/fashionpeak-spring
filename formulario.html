<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Fashion Peak - Producto</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
  <div class="page-container">
    <div class="toolbar">
      <a th:href="@{/productos}" class="toolbar-btn">← Volver</a>
      <span class="toolbar-logo">FASHION PEAK</span>
      <span></span>
    </div>

    <div class="page-content" style="max-width:500px;margin:0 auto;">
      <h2 style="margin-bottom:24px;">
        <!-- Título condicional con Thymeleaf -->
        <span th:text="${esEditar} ? 'Editar Producto' : 'Nuevo Producto'"></span>
      </h2>

      <!-- Formulario con th:object y th:action dinámico -->
      <form th:action="@{/productos/guardar}" method="post" th:object="${producto}">

        <!-- ID oculto para edición -->
        <input type="hidden" th:field="*{idProducto}"/>
        <!-- Token CSRF -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
          <label class="form-label">Nombre del producto</label>
          <input type="text" th:field="*{nombre}" class="form-input"
                 placeholder="Nombre del producto"/>
          <!-- Mensaje de error de validación -->
          <span th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"
                class="error-msg"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Precio</label>
          <input type="number" th:field="*{precio}" class="form-input"
                 placeholder="0.00" step="0.01" min="0"/>
          <span th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"
                class="error-msg"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Cantidad disponible</label>
          <input type="number" th:field="*{cantidad}" class="form-input"
                 placeholder="0" min="0"/>
          <span th:if="${#fields.hasErrors('cantidad')}" th:errors="*{cantidad}"
                class="error-msg"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Categoría</label>
          <select th:field="*{categoria}" class="form-input">
            <option value="Mujer">Mujer</option>
            <option value="Hombre">Hombre</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Nombre de imagen</label>
          <input type="text" th:field="*{imagen}" class="form-input"
                 placeholder="camiseta.png"/>
        </div>

        <div style="display:flex;gap:12px;margin-top:24px;">
          <a th:href="@{/productos}" class="btn-outline"
             style="text-align:center;text-decoration:none;padding:13px;flex:1;">
            Cancelar
          </a>
          <button type="submit" class="btn-primary" style="margin-top:0;flex:1;">
            <span th:text="${esEditar} ? 'Actualizar' : 'Guardar'"></span>
          </button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
