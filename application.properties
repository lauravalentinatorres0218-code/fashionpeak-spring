# =============================================
# Fashion Peak - Spring Boot Configuration
# GA7-220501096-AA3-EV01
# =============================================

# Servidor
server.port=8080
spring.application.name=fashionpeak

# Base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/fashionpeak?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Mensajes de log
logging.level.com.fashionpeak=DEBUG
