<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fashion Peak - Login</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
  <div class="phone-container">
    <div class="login-wrapper">
      <div class="login-logo">
        <h1 class="brand-title">FASHION PEAK</h1>
      </div>
      <h2 class="login-title">Iniciar sesión</h2>
      <p class="login-subtitle">¡Hola! Qué gusto verte de nuevo.</p>

      <!-- Mensaje de error de Spring Security -->
      <div th:if="${param.error}" class="alert alert-error">
        Email o contraseña incorrectos.
      </div>
      <div th:if="${param.logout}" class="alert alert-success">
        Sesión cerrada correctamente.
      </div>

      <!-- Formulario POST gestionado por Spring Security -->
      <form th:action="@{/login}" method="post">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="text" name="username" class="form-input"
                 placeholder="email@ejemplo.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input type="password" name="password" class="form-input"
                 placeholder="••••••••"  required/>
        </div>
        <!-- Token CSRF de Spring Security -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn-primary">Ingresar</button>
      </form>

      <div class="login-footer">
        <a th:href="@{/catalogo}" class="link-gray">Ver catálogo</a>
        <span class="link-red">Ficha 2977463</span>
      </div>
    </div>
  </div>
</body>
</html>
